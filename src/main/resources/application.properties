spring.application.name=GadoappAPI
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gadoapp_db}
spring.datasource.username=${DATABASE_USERNAME:gadoapp-user}
spring.datasource.password=${DATABASE_PASSWORD:123123}
spring.datasource.driver-class-name=org.postgresql.Driver
server.address=0.0.0.0

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Stripe
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# JWT
jwt.secret.key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
